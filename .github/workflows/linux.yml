name: Linux

on:
  push:
    branches:
      - main
      - develop
    tags:    [ 'v*.*.*' ]   # build on tags too (for releases)
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test:
    strategy:
      matrix:
        os: [ubuntu-latest, ubuntu-24.04, ubuntu-22.04]

    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install base build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake make g++

      - name: Configure and build (native x86_64)
        run: |
          mkdir -p build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          cmake --build . -- -j

      - name: Verify build artifacts
        run: |
          ls -l lib/
          ls -l bin/

      - name: Run tests (native)
        shell: bash
        run: |
          set +e
          cd bin
          ./CCSDSPack_tester 2>&1 | tee CCSDSPack_tester.log
          status=${PIPESTATUS[0]}
          exit "$status"

      - name: Upload native test failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: linux-test-log-${{ matrix.os }}-${{ github.sha }}
          path: bin/CCSDSPack_tester.log
          if-no-files-found: error

      - name: Run CLI integration tests
        run: |
          python3 test/cli_integration.py \
            --bin-dir "$PWD/bin" \
            --resources "$PWD/test/test_resources"

      - name: Install shared library package
        run: |
          cmake --install build --prefix "$PWD/build/install"

      - name: Configure installed shared-library consumer
        run: |
          cmake -S test/package_tester/shared_lib \
            -B build/package_tester/shared_lib \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$PWD/build/install"

      - name: Build installed shared-library consumer
        run: |
          cmake --build build/package_tester/shared_lib -- -j

      - name: Run installed shared-library consumer
        run: |
          LD_LIBRARY_PATH="$PWD/build/install/lib:$PWD/build/install/lib64:${LD_LIBRARY_PATH:-}" \
            ctest --test-dir build/package_tester/shared_lib --output-on-failure
        
      - name: Install cross and packaging deps (22.04 only)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          # Install aarch64 cross-build dependencies
          ./install-aarch-cross-build-deps.sh
          ./install-arm-none-cross-build-deps.sh
          sudo apt-get update && sudo apt-get install -y rpm  

      - name: Cleanup and generate packages (22.04 only)
        if: matrix.os == 'ubuntu-22.04'
        shell: bash
        run: |
          set +e
          {
            mkdir -p build packages
            # 1) Native x86_64 .deb
            rm -rf bin/* build/*
            ./package.sh -p DEB

            # 2) Bare-metal Cortex-M7 TGZ
            rm -rf bin/* build/*
            ./package.sh -t cmake/toolchains/arm-none-eabi.cmake -p MCU -m "-fno-exceptions -fno-rtti -mcpu=cortex-m7 -mthumb -mfpu=fpv5-d16 -mfloat-abi=hard"

            # 3) aarch64 .deb
            rm -rf bin/* build/*
            ./package.sh -t cmake/toolchains/aarch64-linux-gnu.cmake -p DEB

            ls -la packages
          } 2>&1 | tee packaging.log
          status=${PIPESTATUS[0]}
          exit "$status"

      - name: Upload packaging failure log
        if: matrix.os == 'ubuntu-22.04' && failure()
        uses: actions/upload-artifact@v4
        with:
          name: linux-packaging-log-${{ github.sha }}
          path: packaging.log
          if-no-files-found: error

      #- name: Upload package artifact
      #  if: matrix.os == 'ubuntu-22.04'
      #  uses: actions/upload-artifact@v4
      #  with:
      #    name: ccsdspack-deb-${{ github.sha }}
      #    path: packages/*.deb
      #    if-no-files-found: error
      # --------------------------
      # Release publishing (only on tags, only from ubuntu-22.04)
      # --------------------------
      - name: Upload to GitHub Release (tag builds)
        if: matrix.os == 'ubuntu-22.04' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: packages/ccsdspack*

      - name: Log in to GHCR
        if: matrix.os == 'ubuntu-22.04' && startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        if: matrix.os == 'ubuntu-22.04' && startsWith(github.ref, 'refs/tags/v')
        run: |
          docker build -t ghcr.io/exospacelabs/ccsdspack:${{ github.ref_name }} -t ghcr.io/exospacelabs/ccsdspack:latest -f docker/Dockerfile docker

      - name: Push Docker image
        if: matrix.os == 'ubuntu-22.04' && startsWith(github.ref, 'refs/tags/v')
        run: |
          docker push ghcr.io/exospacelabs/ccsdspack:${{ github.ref_name }}
          docker push ghcr.io/exospacelabs/ccsdspack:latest
