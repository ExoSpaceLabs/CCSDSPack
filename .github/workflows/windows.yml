name: Windows

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test:
    strategy:
      matrix:
        os: [windows-latest]

    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System' -y
          choco install ninja -y
          choco install mingw -y

      - name: Configure CMake
        run: |
          cd build && cmake -G "MinGW Makefiles" ..
          
      - name: Build project
        run: |
          cd build
          cmake --build . -- 

      - name: Verify build artifacts
        run: |
          echo "Listing contents of build/lib/"
          Get-ChildItem -Path build/lib/
          echo "Listing contents of build/bin/"
          Get-ChildItem -Path build/bin/      

      - name: Run tests
        shell: pwsh
        run: |
          Write-Host "Running CCSDSPack_tester.exe from build\bin\"
          cd build\bin
          .\CCSDSPack_tester.exe

      - name: Validate installed shared-library consumer
        shell: pwsh
        run: |
          $installPrefix = Join-Path $PWD "build/install"
          cmake --install build --prefix $installPrefix
          cmake -S test/package_tester/shared_lib `
            -B build/package_tester/shared_lib `
            -G "MinGW Makefiles" `
            "-DCMAKE_PREFIX_PATH=$installPrefix"
          cmake --build build/package_tester/shared_lib --
          $env:PATH = "$(Join-Path $installPrefix 'bin');$env:PATH"
          ctest --test-dir build/package_tester/shared_lib --output-on-failure
