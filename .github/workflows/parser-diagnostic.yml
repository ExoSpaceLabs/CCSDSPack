name: Parser Diagnostic

on:
  pull_request:
    branches: [develop]

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Build and test quietly
        shell: bash
        run: |
          set -o pipefail
          git clone --quiet --depth 1 --branch "${GITHUB_HEAD_REF}" "https://github.com/${GITHUB_REPOSITORY}.git" source
          cmake -S source -B build -DCMAKE_BUILD_TYPE=Debug >/dev/null
          if ! cmake --build build -- -j2 >build.log 2>&1; then
            grep -nE "error:|fatal error:|undefined reference|FAILED:" build.log || tail -n 100 build.log
            exit 1
          fi
          if ! (cd source/bin && ./CCSDSPack_tester) >test.log 2>&1; then
            cat test.log
            exit 1
          fi
          echo "Build and tests passed."
