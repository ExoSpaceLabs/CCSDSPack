name: Debug Tests

on:
  pull_request:
    branches:
      - develop
  workflow_dispatch:

jobs:
  failing-tests:
    runs-on: ubuntu-24.04
    steps:
      - name: Build and report failures
        shell: bash
        run: |
          git clone --quiet --depth 1 --branch fix/v1.2-packet-length-crc \
            https://github.com/ExoSpaceLabs/CCSDSPack.git repo
          cd repo
          cmake -S . -B build \
            -DENABLE_ENCODER=OFF \
            -DENABLE_DECODER=OFF \
            -DENABLE_VALIDATOR=OFF >/dev/null
          cmake --build build --parallel 2 >/dev/null
          cd bin
          set +e
          output=$(./CCSDSPack_tester 2>&1)
          status=$?
          printf '%s\n' "$output" | grep -E '\[.*FAIL.*\]|Test Results:|PASSED:|TEST TIME:' || true
          exit "$status"
