name: Debug Tests

on:
  push:
    branches:
      - fix/v1.2-packet-length-crc
  workflow_dispatch:

jobs:
  failing-tests:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build quietly
        shell: bash
        run: |
          cmake -S . -B build \
            -DENABLE_ENCODER=OFF \
            -DENABLE_DECODER=OFF \
            -DENABLE_VALIDATOR=OFF >/dev/null
          cmake --build build --parallel 2 >/dev/null

      - name: Report failures
        shell: bash
        run: |
          set +e
          output=$(./bin/CCSDSPack_tester 2>&1)
          status=$?
          printf '%s\n' "$output" | grep -E '\[.*FAIL.*\]|Test Results:|PASSED:|TEST TIME:' || true
          exit "$status"
